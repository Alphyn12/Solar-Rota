<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    

    <linearGradient id="panelCells" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"></stop>
      <stop offset="50%" stop-color="#0F172A"></stop>
      <stop offset="100%" stop-color="#1E3A8A"></stop>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE047"></stop>
      <stop offset="100%" stop-color="#F59E0B"></stop>
    </linearGradient>
  </defs>

  <g transform="translate(35, 35)" class="sun-pulse">
    <circle cx="0" cy="0" r="14" fill="url(#sunGrad)"></circle>
    <path d="M 0 -19 L 0 -24 M 0 19 L 0 24 M -19 0 L -24 0 M 19 0 L 24 0 M -13.5 -13.5 L -17 -17 M 13.5 13.5 L 17 17 M -13.5 13.5 L -17 17 M 13.5 -13.5 L 17 -17" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"></path>
  </g>

  <path d="M 85 110 Q 85 150, 95 150" fill="none" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" class="dc-flow"></path>
  
  <path d="M 125 150 Q 165 150, 165 110 L 165 80" fill="none" stroke="#38BDF8" stroke-width="3" stroke-linecap="round" class="water-flow"></path>

  <g transform="translate(165, 75)">
    <path d="M -25 15 L 0 0 L 25 15 L 0 30 Z" fill="#020617" stroke="#064E3B" stroke-width="2" stroke-linejoin="round"></path>
    <path d="M -15 9 L -5 15 M -5 3 L 5 9 M 5 -3 L 15 3" stroke="#10B981" stroke-width="1.5" opacity="0.4"></path>
    
    <path d="M -15 15 Q -18 5, -15 0 Q -12 5, -15 15" fill="#10B981"></path>
    <path d="M 0 22 Q -3 12, 0 7 Q 3 12, 0 22" fill="#10B981"></path>
    <path d="M 15 15 Q 12 5, 15 0 Q 18 5, 15 15" fill="#10B981"></path>

    <path d="M 0 15 L 0 -10" stroke="#64748B" stroke-width="3" stroke-linecap="round"></path>
    <polygon points="-4,-10 4,-10 0,-15" fill="#38BDF8"></polygon>
    
    <g stroke="#38BDF8" stroke-width="2" stroke-linecap="round" class="water-spray" fill="none">
      <path d="M -2 -14 Q -20 -25, -25 -5"></path>
      <path d="M 0 -16 Q 0 -35, 0 -20"></path>
      <path d="M 2 -14 Q 20 -25, 25 -5"></path>
    </g>
  </g>

  <g transform="translate(110, 150)">
    <rect x="-24" y="-16" width="48" height="32" rx="4" fill="#0F172A"></rect>
    
    <rect x="-22" y="-12" width="24" height="24" rx="3" fill="#1E293B" stroke="#475569" stroke-width="2"></rect>
    <path d="M -17 -12 L -17 12 M -13 -12 L -13 12 M -9 -12 L -9 12 M -5 -12 L -5 12" stroke="#334155" stroke-width="2"></path>
    
    <rect x="-18" y="-18" width="16" height="6" rx="1.5" fill="#020617" stroke="#475569" stroke-width="1"></rect>
    <circle cx="-14" cy="-15" r="1.5" class="drive-blink"></circle>
    <circle cx="-6" cy="-15" r="1.5" fill="#F59E0B"></circle>
    
    <circle cx="10" cy="0" r="14" fill="#020617" stroke="#38BDF8" stroke-width="2"></circle>
    <circle cx="10" cy="0" r="5" fill="#1E293B" stroke="#38BDF8" stroke-width="1"></circle>
    
    <g class="pump-spin">
      <path d="M 10 0 L 10 -10" stroke="#38BDF8" stroke-width="2" stroke-linecap="round"></path>
      <path d="M 10 0 L 18.6 5" stroke="#38BDF8" stroke-width="2" stroke-linecap="round"></path>
      <path d="M 10 0 L 1.4 5" stroke="#38BDF8" stroke-width="2" stroke-linecap="round"></path>
    </g>

    <rect x="5" y="-18" width="10" height="4" fill="#334155"></rect>
  </g>

  <g transform="translate(70, 95) scale(0.9) rotate(-30) skewX(25)">
    <rect x="-38" y="-38" width="76" height="76" rx="4" fill="#64748B" transform="translate(2, 2)"></rect>
    <rect x="-40" y="-40" width="80" height="80" rx="4" fill="#CBD5E1" stroke="#94A3B8" stroke-width="1.5"></rect>
    <rect x="-36" y="-36" width="72" height="72" rx="2" fill="url(#panelCells)"></rect>
    
    <g stroke="#3B82F6" stroke-width="0.75" opacity="0.6">
      <line x1="-12" y1="-36" x2="-12" y2="36"></line>
      <line x1="12" y1="-36" x2="12" y2="36"></line>
      <line x1="-36" y1="-12" x2="36" y2="-12"></line>
      <line x1="-36" y1="12" x2="36" y2="12"></line>
    </g>

    <g stroke="#94A3B8" stroke-width="0.3" opacity="0.8">
      <line x1="-24" y1="-36" x2="-24" y2="36"></line>
      <line x1="0" y1="-36" x2="0" y2="36"></line>
      <line x1="24" y1="-36" x2="24" y2="36"></line>
    </g>

    <polygon points="-36,-36 10,-36 -36,10" fill="#ffffff" class="glass-shine"></polygon>
  </g>
