<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%">
  <div>
    <label style="font-family:Inter;font-size:11px;font-weight:600;color:#94A3B8;text-transform:uppercase;letter-spacing:.08em">System Size</label>
    <div style="margin-top:6px;position:relative">
      <input value="8.4" style="width:100%;font-family:'Space Grotesk';font-weight:700;font-size:18px;color:#F1F5F9;background:#1E293B;border:1px solid #475569;border-radius:14px;padding:12px 14px;padding-right:48px;outline:none" />
      <span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);font-family:'Space Grotesk';font-size:12px;color:#94A3B8;font-weight:600">kWp</span>
    </div>
  </div>
  <div>
    <label style="font-family:Inter;font-size:11px;font-weight:600;color:#94A3B8;text-transform:uppercase;letter-spacing:.08em">Scenario</label>
    <div style="margin-top:6px;font-family:'Space Grotesk';font-weight:600;font-size:14px;color:#F1F5F9;background:#1E293B;border:1px solid #F59E0B;border-radius:14px;padding:12px 14px;box-shadow:0 0 0 3px rgba(245,158,11,.15);display:flex;justify-content:space-between;align-items:center">On-Grid Rooftop<span style="color:#94A3B8;font-weight:400">▾</span></div>
  </div>
  <div>
    <label style="font-family:Inter;font-size:11px;font-weight:600;color:#94A3B8;text-transform:uppercase;letter-spacing:.08em">Search address</label>
    <div style="margin-top:6px;font-family:Inter;font-size:13px;color:#64748B;background:rgba(255,255,255,0.02);border:1px dashed rgba(255,255,255,.1);border-radius:14px;padding:12px 14px">Lat, lng or place…</div>
  </div>
  <div>
    <label style="font-family:Inter;font-size:11px;font-weight:600;color:#EF4444;text-transform:uppercase;letter-spacing:.08em">Tilt (error)</label>
    <div style="margin-top:6px;font-family:'Space Grotesk';font-weight:700;font-size:18px;color:#F1F5F9;background:#1E293B;border:1px solid #EF4444;border-radius:14px;padding:12px 14px;box-shadow:0 0 0 3px rgba(239,68,68,.12)">95°</div>
  </div>
</div>
</body></html>
