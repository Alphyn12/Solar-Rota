<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body style="align-items:center">
<div style="display:flex;gap:14px;align-items:stretch;width:100%">
  <!-- Primary — amber halo, generous scale -->
  <div style="flex:1;min-height:160px;border-radius:14px;background:radial-gradient(ellipse at 35% 55%,rgba(245,158,11,.22) 0%,transparent 60%),rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;padding:8px">
    <img src="logo.png" style="height:150px;width:auto;filter:drop-shadow(0 3px 8px rgba(0,0,0,.5))" alt="SolarRota mark"/>
  </div>

  <!-- Mono amber on dark — for icon contexts where cyan doesn't fit -->
  <div style="flex:1;min-height:160px;border-radius:14px;background:linear-gradient(135deg,#1E293B 0%,#0F172A 100%);border:1px solid rgba(245,158,11,.25);display:flex;align-items:center;justify-content:center;padding:8px;position:relative;overflow:hidden">
    <div style="position:absolute;inset:0;background:radial-gradient(circle at 70% 30%,rgba(252,211,77,.1),transparent 60%)"></div>
    <img src="logo.png" style="height:150px;width:auto;filter:brightness(0) saturate(100%) invert(72%) sepia(46%) saturate(1920%) hue-rotate(357deg) brightness(101%) contrast(99%) drop-shadow(0 0 14px rgba(245,158,11,.35))" alt="SolarRota mark — amber mono"/>
  </div>

  <div style="flex:0 0 190px;display:flex;flex-direction:column;justify-content:center;gap:8px;padding:4px 2px">
    <div style="font-family:'Space Grotesk';font-weight:800;font-size:20px;color:#F1F5F9;letter-spacing:-0.03em">SolarRota</div>
    <div style="font-family:Inter;font-size:11.5px;color:#94A3B8;line-height:1.5">Primary cyan mark sits on an <em style="color:#FCD34D">amber halo</em> over dark canvas. For icon-only contexts, use the <em style="color:#FCD34D">amber monochrome</em> variant.</div>
    <div class="mono" style="color:#64748B;margin-top:4px">Min height 40px</div>
  </div>
</div>
</body></html>
