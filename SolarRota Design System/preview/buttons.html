<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;width:100%">
  <button style="font-family:'Space Grotesk';font-weight:700;font-size:14px;color:#0F172A;background:linear-gradient(135deg,#F59E0B,#FCD34D);border:none;padding:12px 22px;border-radius:40px;box-shadow:0 0 24px rgba(245,158,11,.35),0 4px 16px rgba(0,0,0,.4);cursor:pointer;letter-spacing:-0.01em">Start Calculation →</button>
  <button style="font-family:'Space Grotesk';font-weight:700;font-size:13px;color:#F1F5F9;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,.12);padding:11px 20px;border-radius:40px;cursor:pointer;backdrop-filter:blur(8px)">Secondary</button>
  <button style="font-family:'Space Grotesk';font-weight:700;font-size:13px;color:#F59E0B;background:transparent;border:1px solid rgba(245,158,11,.4);padding:11px 20px;border-radius:40px;cursor:pointer">Ghost</button>
  <button style="font-family:'Space Grotesk';font-weight:700;font-size:12px;color:#F1F5F9;background:#1E293B;border:1px solid #475569;padding:8px 14px;border-radius:10px;cursor:pointer">Small</button>
  <button disabled style="font-family:'Space Grotesk';font-weight:700;font-size:13px;color:#475569;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,.06);padding:11px 20px;border-radius:40px;cursor:not-allowed">Disabled</button>
</div>
</body></html>
