<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;width:100%;height:100%">
  <div style="border-radius:14px;height:130px;background:#0F172A;background-image:radial-gradient(ellipse 80% 60% at 20% -10%,rgba(245,158,11,0.14) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 110%,rgba(6,182,212,0.10) 0%,transparent 55%);display:flex;align-items:flex-end;padding:10px;font-family:'Space Grotesk',monospace;font-size:11px;color:#94A3B8">App canvas · dual radial</div>
  <div style="border-radius:14px;height:130px;background:linear-gradient(135deg,#F59E0B 0%,#FCD34D 50%,#06B6D4 110%);display:flex;align-items:flex-end;padding:10px;font-family:'Space Grotesk',monospace;font-size:11px;color:#0F172A;font-weight:700">Hero · Sunrise gradient</div>
  <div style="border-radius:14px;height:130px;background:#0F172A;position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:10px;font-family:'Space Grotesk',monospace;font-size:11px;color:#94A3B8">
    <svg style="position:absolute;inset:0" width="100%" height="100%"><defs><pattern id="g" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(148,163,184,0.08)" stroke-width="1"/></pattern></defs><rect width="100%" height="100%" fill="url(#g)"/></svg>
    <span style="position:relative">Map grid · muted</span>
  </div>
</div>
</body></html>
