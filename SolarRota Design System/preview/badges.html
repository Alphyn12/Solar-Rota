<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body style="align-items:center">
<style>
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
  .live{animation:pulse 1.6s cubic-bezier(.4,0,.6,1) infinite}
</style>
<div style="width:100%;display:flex;flex-direction:column;gap:12px">

  <!-- Row 1 — status tokens: split chip with quiet label + strong value -->
  <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
    <div style="display:inline-flex;align-items:stretch;border-radius:8px;overflow:hidden;background:rgba(255,255,255,.02);border:1px solid rgba(16,185,129,.22)">
      <span style="padding:5px 11px;display:flex;align-items:center;gap:7px;font-family:Inter;font-size:11px;color:#94A3B8;font-weight:500">
        <span class="live" style="width:5px;height:5px;border-radius:50%;background:#10B981;box-shadow:0 0 6px #10B981"></span>PVGIS
      </span>
      <span style="padding:5px 11px;background:rgba(16,185,129,.12);font-family:'Space Grotesk';font-size:10.5px;font-weight:700;color:#6EE7B7;letter-spacing:.04em">Verified</span>
    </div>

    <div style="display:inline-flex;align-items:stretch;border-radius:8px;overflow:hidden;background:rgba(255,255,255,.02);border:1px solid rgba(234,179,8,.22)">
      <span style="padding:5px 11px;display:flex;align-items:center;gap:7px;font-family:Inter;font-size:11px;color:#94A3B8;font-weight:500">
        <span style="width:5px;height:5px;border-radius:50%;background:#EAB308"></span>Tariff
      </span>
      <span style="padding:5px 11px;background:rgba(234,179,8,.1);font-family:'Space Grotesk';font-size:10.5px;font-weight:700;color:#FDE68A;font-variant-numeric:tabular-nums">62 d</span>
    </div>

    <div style="display:inline-flex;align-items:stretch;border-radius:8px;overflow:hidden;background:rgba(255,255,255,.02);border:1px solid rgba(239,68,68,.22)">
      <span style="padding:5px 11px;display:flex;align-items:center;gap:7px;font-family:Inter;font-size:11px;color:#94A3B8;font-weight:500">
        <span style="width:5px;height:5px;border-radius:50%;background:#EF4444"></span>Bill
      </span>
      <span style="padding:5px 11px;background:rgba(239,68,68,.1);font-family:'Space Grotesk';font-size:10.5px;font-weight:700;color:#FCA5A5">Missing</span>
    </div>

    <div style="display:inline-flex;align-items:center;gap:8px;padding:5px 11px;border-radius:8px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);font-family:Inter;font-size:11px;color:#CBD5E1;font-weight:500">
      Bills<span style="font-family:'Space Grotesk';font-size:10px;font-weight:800;color:#0F172A;background:#FCD34D;padding:1px 6px;border-radius:4px;font-variant-numeric:tabular-nums;letter-spacing:-.01em">4</span>
    </div>

    <div style="display:inline-flex;align-items:center;gap:7px;padding:5px 11px;border-radius:8px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);font-family:Inter;font-size:11px;color:#94A3B8">
      <span>Filter</span>
      <kbd style="font-family:'Space Grotesk',monospace;font-size:9.5px;color:#E2E8F0;background:rgba(15,23,42,.9);border:1px solid rgba(255,255,255,.1);border-radius:3px;padding:1px 5px;box-shadow:inset 0 -1px 0 rgba(0,0,0,.4),0 1px 0 rgba(255,255,255,.04)">⌘K</kbd>
    </div>
  </div>

  <!-- Row 2 — minimal scenario tags (pill, left indicator) -->
  <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
    <div style="display:inline-flex;align-items:center;gap:7px;padding:5px 11px 5px 9px;border-radius:999px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3)">
      <span style="width:6px;height:6px;border-radius:1.5px;background:#FCD34D;box-shadow:0 0 6px rgba(245,158,11,.6)"></span>
      <span style="font-family:Inter;font-size:11px;font-weight:600;color:#FCD34D;letter-spacing:.01em">On-Grid</span>
    </div>
    <div style="display:inline-flex;align-items:center;gap:7px;padding:5px 11px 5px 9px;border-radius:999px;background:rgba(148,163,184,.06);border:1px solid rgba(148,163,184,.2)">
      <span style="width:6px;height:6px;border-radius:1.5px;background:#94A3B8"></span>
      <span style="font-family:Inter;font-size:11px;font-weight:600;color:#CBD5E1">Off-Grid</span>
    </div>
    <div style="display:inline-flex;align-items:center;gap:7px;padding:5px 11px 5px 9px;border-radius:999px;background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.22)">
      <span style="width:6px;height:6px;border-radius:1.5px;background:#22D3EE"></span>
      <span style="font-family:Inter;font-size:11px;font-weight:600;color:#67E8F9">Irrigation</span>
    </div>
    <div style="display:inline-flex;align-items:center;gap:7px;padding:5px 11px 5px 9px;border-radius:999px;background:rgba(217,119,6,.06);border:1px solid rgba(217,119,6,.22)">
      <span style="width:6px;height:6px;border-radius:1.5px;background:#D97706"></span>
      <span style="font-family:Inter;font-size:11px;font-weight:600;color:#FCD34D">Heat Pump</span>
    </div>
    <!-- Removable chip -->
    <div style="display:inline-flex;align-items:center;gap:7px;padding:5px 6px 5px 11px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1)">
      <span style="font-family:Inter;font-size:11px;font-weight:500;color:#CBD5E1">Valencia, ES</span>
      <span style="width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:10px;color:#94A3B8;cursor:pointer">×</span>
    </div>
  </div>

</div>
</body></html>
