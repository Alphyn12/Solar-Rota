<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body style="align-items:stretch">
<div style="width:100%;display:flex;flex-direction:column;gap:10px">

  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">

    <!-- On-Grid · active amber -->
    <div style="padding:11px 12px;border-radius:12px;background:linear-gradient(135deg,rgba(245,158,11,.22),rgba(252,211,77,.06));border:1px solid rgba(245,158,11,.45);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 0 18px rgba(245,158,11,.12)">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
        <div style="width:18px;height:18px;border-radius:5px;background:linear-gradient(135deg,#FCD34D,#D97706);box-shadow:0 0 10px rgba(245,158,11,.5)"></div>
        <span style="font-family:'Space Grotesk';font-size:10.5px;font-weight:700;color:#FCD34D;letter-spacing:.06em">On-Grid</span>
      </div>
      <div class="mono" style="font-size:9.5px;color:#94A3B8">amber 300 → 700 · active</div>
    </div>

    <!-- Off-Grid · slate -->
    <div style="padding:11px 12px;border-radius:12px;background:rgba(148,163,184,.06);border:1px solid rgba(148,163,184,.18)">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
        <div style="width:18px;height:18px;border-radius:5px;background:linear-gradient(135deg,#64748B,#334155)"></div>
        <span style="font-family:'Space Grotesk';font-size:10.5px;font-weight:700;color:#CBD5E1;letter-spacing:.06em">Off-Grid</span>
      </div>
      <div class="mono" style="font-size:9.5px;color:#64748B">slate 500 → 700</div>
    </div>

    <!-- Irrigation · cyan -->
    <div style="padding:11px 12px;border-radius:12px;background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.22)">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
        <div style="width:18px;height:18px;border-radius:5px;background:linear-gradient(135deg,#22D3EE,#0891B2);box-shadow:0 0 8px rgba(6,182,212,.25)"></div>
        <span style="font-family:'Space Grotesk';font-size:10.5px;font-weight:700;color:#67E8F9;letter-spacing:.06em">Irrigation</span>
      </div>
      <div class="mono" style="font-size:9.5px;color:#64748B">cyan 400 → 700</div>
    </div>

    <!-- Heat Pump · amber dark -->
    <div style="padding:11px 12px;border-radius:12px;background:rgba(217,119,6,.06);border:1px solid rgba(217,119,6,.2)">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
        <div style="width:18px;height:18px;border-radius:5px;background:linear-gradient(135deg,#D97706,#78350F)"></div>
        <span style="font-family:'Space Grotesk';font-size:10.5px;font-weight:700;color:#FCD34D;letter-spacing:.06em">Heat Pump</span>
      </div>
      <div class="mono" style="font-size:9.5px;color:#64748B">amber dark → 900</div>
    </div>

  </div>

  <div style="font-family:Inter;font-size:11px;color:#64748B;line-height:1.55;padding:0 2px">
    Scenarios are <em style="color:#94A3B8">tonal ramps</em> of the amber / cyan / slate axis — not a rainbow. Only the <em style="color:#FCD34D">active</em> scenario earns the full amber; others read as quiet data.
  </div>
</div>
</body></html>
