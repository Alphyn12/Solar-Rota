<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body style="align-items:center">
<div style="width:100%;font-variant-numeric:tabular-nums;display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:0;align-items:stretch">

  <!-- Hero · amber accent -->
  <div style="padding:2px 28px 2px 4px;border-right:1px solid rgba(148,163,184,.12);display:flex;flex-direction:column;justify-content:space-between;gap:14px">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="width:5px;height:5px;background:#F59E0B;border-radius:1px"></span>
      <span style="font-family:'Space Grotesk';font-size:9.5px;font-weight:700;color:#F59E0B;text-transform:uppercase;letter-spacing:.18em">Annual yield</span>
      <span style="flex:1;height:1px;background:linear-gradient(90deg,rgba(245,158,11,.3),transparent)"></span>
      <span class="mono" style="font-size:9.5px;color:#64748B">MWh</span>
    </div>
    <div style="font-family:'Space Grotesk';font-weight:300;font-size:72px;letter-spacing:-0.06em;line-height:.85;color:#F8FAFC">12<span style="color:#F59E0B;font-weight:400">.</span>48</div>
    <div style="display:flex;align-items:center;gap:10px;font-family:Inter;font-size:11px;color:#94A3B8">
      <span style="color:#6EE7B7;font-family:'Space Grotesk';font-weight:700">▲ 3.2%</span>
      <span style="width:3px;height:3px;border-radius:50%;background:#334155"></span>
      <span>vs PVGIS baseline</span>
    </div>
  </div>

  <!-- Efficiency · cyan accent -->
  <div style="padding:2px 28px;border-right:1px solid rgba(148,163,184,.12);display:flex;flex-direction:column;justify-content:space-between;gap:14px">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="width:5px;height:5px;background:#06B6D4;border-radius:1px"></span>
      <span style="font-family:'Space Grotesk';font-size:9.5px;font-weight:700;color:#06B6D4;text-transform:uppercase;letter-spacing:.18em">Efficiency</span>
      <span style="flex:1;height:1px;background:linear-gradient(90deg,rgba(6,182,212,.3),transparent)"></span>
    </div>
    <div style="font-family:'Space Grotesk';font-weight:300;font-size:52px;letter-spacing:-0.05em;line-height:.85;color:#F8FAFC">98<span style="color:#06B6D4;font-weight:400">.</span>4<span style="color:#475569;font-weight:300;font-size:28px;margin-left:2px">%</span></div>
    <div style="display:flex;align-items:center;gap:10px;font-family:Inter;font-size:11px;color:#94A3B8">
      <span class="mono" style="color:#67E8F9">ηinv</span>
      <span style="width:3px;height:3px;border-radius:50%;background:#334155"></span>
      <span>peak load 80%</span>
    </div>
  </div>

  <!-- Payback · emerald accent -->
  <div style="padding:2px 4px 2px 28px;display:flex;flex-direction:column;justify-content:space-between;gap:14px">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="width:5px;height:5px;background:#10B981;border-radius:1px"></span>
      <span style="font-family:'Space Grotesk';font-size:9.5px;font-weight:700;color:#10B981;text-transform:uppercase;letter-spacing:.18em">Payback</span>
      <span style="flex:1;height:1px;background:linear-gradient(90deg,rgba(16,185,129,.3),transparent)"></span>
    </div>
    <div style="font-family:'Space Grotesk';font-weight:300;font-size:52px;letter-spacing:-0.05em;line-height:.85;color:#F8FAFC">6<span style="color:#10B981;font-weight:400">.</span>2<span style="color:#475569;font-weight:300;font-size:22px;margin-left:4px">yr</span></div>
    <div style="display:flex;align-items:center;gap:10px;font-family:Inter;font-size:11px;color:#94A3B8">
      <span class="mono" style="color:#6EE7B7">IRR</span>
      <span style="font-family:'Space Grotesk';font-weight:700;color:#F8FAFC">13.8%</span>
      <span style="width:3px;height:3px;border-radius:50%;background:#334155"></span>
      <span>25-yr NPV €41.2k</span>
    </div>
  </div>

</div>
</body></html>
