<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%">
  <div class="swatch" style="background:#06B6D4"><span class="name">Inverter Cyan</span><span class="hex">--accent · #06B6D4</span></div>
  <div class="swatch" style="background:#0891B2"><span class="name">Cyan Dark</span><span class="hex">--accent-dark · #0891B2</span></div>
  <div class="swatch" style="background:#0F172A;border:1px solid #475569"><span class="name">Canvas</span><span class="hex">--secondary · #0F172A</span></div>
  <div class="swatch" style="background:#1E293B"><span class="name">Surface</span><span class="hex">--surface · #1E293B</span></div>
  <div class="swatch" style="background:#334155"><span class="name">Surface Light</span><span class="hex">--surface-light · #334155</span></div>
  <div class="swatch" style="background:rgba(255,255,255,0.03);border:1px dashed rgba(255,255,255,0.2)"><span class="name">Glass</span><span class="hex">rgba(255,255,255,.03) +blur</span></div>
  <div class="swatch" style="background:#F1F5F9;color:#111"><span class="name" style="color:#111;text-shadow:none">Text</span><span class="hex" style="color:rgba(0,0,0,.6)">--text · #F1F5F9</span></div>
  <div class="swatch" style="background:#94A3B8;color:#111"><span class="name" style="color:#111;text-shadow:none">Text Muted</span><span class="hex" style="color:rgba(0,0,0,.6)">--text-muted · #94A3B8</span></div>
</div>
</body></html>
