<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%">
  <div class="swatch" style="background:#F59E0B"><span class="name">Solar Amber</span><span class="hex">--primary · #F59E0B</span></div>
  <div class="swatch" style="background:#D97706"><span class="name">Amber Dark</span><span class="hex">--primary-dark · #D97706</span></div>

  <div class="swatch" style="background:linear-gradient(135deg,#F59E0B 0%,#FCD34D 100%)"><span class="name">Logo Gradient</span><span class="hex">135°, amber → highlight</span></div>
</div>
