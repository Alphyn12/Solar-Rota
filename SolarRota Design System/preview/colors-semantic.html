<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;width:100%">
  <div style="display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:10px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25)">
    <span style="width:8px;height:8px;border-radius:50%;background:#10B981;box-shadow:0 0 8px rgba(16,185,129,.6)"></span>
    <span style="font-family:Inter;font-size:12px;font-weight:600;color:#6EE7B7">Success</span>
    <span class="mono" style="color:#94A3B8">#10B981</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:10px;background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.25)">
    <span style="width:8px;height:8px;border-radius:50%;background:#EAB308"></span>
    <span style="font-family:Inter;font-size:12px;font-weight:600;color:#FDE68A">Warning</span>
    <span class="mono" style="color:#94A3B8">#EAB308</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:10px;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2)">
    <span style="width:8px;height:8px;border-radius:50%;background:#EF4444"></span>
    <span style="font-family:Inter;font-size:12px;font-weight:600;color:#FCA5A5">Danger</span>
    <span class="mono" style="color:#94A3B8">#EF4444</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,.08)">
    <span style="width:8px;height:8px;border-radius:50%;background:#94A3B8"></span>
    <span style="font-family:Inter;font-size:12px;font-weight:600;color:#CBD5E1">Neutral</span>
    <span class="mono" style="color:#94A3B8">#94A3B8</span>
  </div>
</div>
<div style="margin-top:10px;font-family:Inter;font-size:11px;color:#64748B;line-height:1.6">
  Semantic colors live in <em style="color:#94A3B8">backgrounds and borders at low alpha</em>, not in large fills. Status is signalled by a dot + label; saturated swatches are reserved for the primary amber.
</div>
</body></html>
