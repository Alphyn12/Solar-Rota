<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%">
  <div style="background:#1E293B;border-radius:14px;height:80px;box-shadow:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',monospace;font-size:11px;color:#94A3B8">sm · subtle lift</div>
  <div style="background:#1E293B;border-radius:14px;height:80px;box-shadow:0 4px 16px rgba(0,0,0,.4),0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',monospace;font-size:11px;color:#94A3B8">md · buttons / modals</div>
  <div style="background:rgba(255,255,255,0.03);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);border-radius:14px;height:80px;box-shadow:0 1px 0 rgba(255,255,255,0.05) inset,0 8px 32px rgba(0,0,0,.4),0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',monospace;font-size:11px;color:#94A3B8">card · glass + inset hi</div>
  <div style="background:#1E293B;border-radius:14px;height:80px;box-shadow:0 0 24px rgba(245,158,11,.3),0 4px 16px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',monospace;font-size:11px;color:#F59E0B">glow · primary</div>
  <div style="background:#1E293B;border-radius:14px;height:80px;box-shadow:0 0 24px rgba(6,182,212,.25),0 4px 16px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',monospace;font-size:11px;color:#06B6D4">glow · accent</div>
  <div style="background:#1E293B;border-radius:14px;height:80px;border:2px solid #F59E0B;box-shadow:0 0 32px rgba(245,158,11,.2);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',monospace;font-size:11px;color:#F59E0B">selected · border+glow</div>
</div>
</body></html>
