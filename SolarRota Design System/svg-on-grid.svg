<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    

    <linearGradient id="panelCells" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"></stop>
      <stop offset="50%" stop-color="#0F172A"></stop>
      <stop offset="100%" stop-color="#1E3A8A"></stop>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE047"></stop>
      <stop offset="100%" stop-color="#F59E0B"></stop>
    </linearGradient>
  </defs>

  <g transform="translate(35, 35)" class="sun-pulse">
    <circle cx="0" cy="0" r="14" fill="url(#sunGrad)"></circle>
    <path d="M 0 -19 L 0 -24 M 0 19 L 0 24 M -19 0 L -24 0 M 19 0 L 24 0 M -13.5 -13.5 L -17 -17 M 13.5 13.5 L 17 17 M -13.5 13.5 L -17 17 M 13.5 -13.5 L 17 -17" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"></path>
  </g>

  <path d="M 70 110 Q 70 150, 95 150" fill="none" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" class="dc-flow"></path>
  
  <path d="M 125 150 Q 165 150, 165 110 L 165 80" fill="none" stroke="#38BDF8" stroke-width="3" stroke-linecap="round" class="ac-flow"></path>

  <g transform="translate(165, 75)" stroke-linejoin="round" stroke-linecap="round">
    <path d="M -12 35 L 0 -15 L 12 35" fill="none" stroke="#64748B" stroke-width="2.5"></path>
    <path d="M 0 -15 L 0 35" fill="none" stroke="#475569" stroke-width="1.5"></path>
    <path d="M -18 5 L 18 5 M -12 -5 L 12 -5 M -22 15 L 22 15" fill="none" stroke="#64748B" stroke-width="2"></path>
    <path d="M -12 35 L 0 15 L 12 35 M -8 15 L 0 5 L 8 15 M -4 5 L 0 -5 L 4 5" fill="none" stroke="#475569" stroke-width="1" opacity="0.6"></path>
    <circle cx="-18" cy="5" r="2" fill="#E2E8F0" stroke="none"></circle>
    <circle cx="18" cy="5" r="2" fill="#E2E8F0" stroke="none"></circle>
    <circle cx="-22" cy="15" r="2" fill="#E2E8F0" stroke="none"></circle>
    <circle cx="22" cy="15" r="2" fill="#E2E8F0" stroke="none"></circle>
  </g>

  <g transform="translate(110, 150)">
    <rect x="-14" y="-18" width="28" height="36" rx="4" fill="#0F172A"></rect>
    <rect x="-16" y="-20" width="32" height="40" rx="4" fill="#1E293B" stroke="#475569" stroke-width="2"></rect>
    <path d="M -10 -12 L 10 -12 M -10 -7 L 10 -7 M -10 -2 L 10 -2" stroke="#334155" stroke-width="2" stroke-linecap="round"></path>
    <rect x="-8" y="5" width="16" height="10" rx="1.5" fill="#020617"></rect>
    <circle cx="0" cy="10" r="2" class="led-blink"></circle>
  </g>

  <g transform="translate(70, 95) scale(0.9) rotate(-30) skewX(25)">
    <rect x="-38" y="-38" width="76" height="76" rx="4" fill="#64748B" transform="translate(2, 2)"></rect>
    <rect x="-40" y="-40" width="80" height="80" rx="4" fill="#CBD5E1" stroke="#94A3B8" stroke-width="1.5"></rect>
    <rect x="-36" y="-36" width="72" height="72" rx="2" fill="url(#panelCells)"></rect>
    
    <g stroke="#3B82F6" stroke-width="0.75" opacity="0.6">
      <line x1="-12" y1="-36" x2="-12" y2="36"></line>
      <line x1="12" y1="-36" x2="12" y2="36"></line>
      
      <line x1="-36" y1="-12" x2="36" y2="-12"></line>
      <line x1="-36" y1="12" x2="36" y2="12"></line>
    </g>

    <g stroke="#94A3B8" stroke-width="0.3" opacity="0.8">
      <line x1="-24" y1="-36" x2="-24" y2="36"></line>
      <line x1="0" y1="-36" x2="0" y2="36"></line>
      <line x1="24" y1="-36" x2="24" y2="36"></line>
    </g>

